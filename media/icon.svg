<svg xmlns="http://www.w3.org/2000/svg" viewBox="18 24 92 80">
  <defs>
    <!-- Premium dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1428;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1f2d;stop-opacity:1" />
    </linearGradient>
    
    <!-- Eye gradient - Blue to Gold -->
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0078d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
    </linearGradient>
    
    <!-- Iris gradient - Cyan to Purple -->
    <linearGradient id="irisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9d4edd;stop-opacity:1" />
    </linearGradient>
    
    <!-- Pupil radial - Gold to Blue -->
    <radialGradient id="pupilGrad">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0078d4;stop-opacity:1" />
    </radialGradient>
    
    <!-- Premium glow -->
    <filter id="premiumGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow for depth -->
    <filter id="deepShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.4" flood-color="#000000"/>
    </filter>
  </defs>
  
  <!-- Premium dark background -->
  <rect width="128" height="128" fill="url(#bgGrad)"/>
  
  <!-- Decorative corner accents -->
  <circle cx="12" cy="12" r="3" fill="#ffd700" opacity="0.3"/>
  <circle cx="116" cy="116" r="3" fill="#00ffff" opacity="0.3"/>
  
  <!-- Eye outline with premium gradient -->
  <path d="M 28 64 Q 64 32 100 64 Q 64 96 28 64" fill="url(#eyeGrad)" filter="url(#deepShadow)" opacity="0.95"/>
  
  <!-- Eye outer stroke - Gold accent -->
  <path d="M 28 64 Q 64 32 100 64 Q 64 96 28 64" fill="none" stroke="#ffd700" stroke-width="2.5" opacity="0.6" filter="url(#premiumGlow)"/>
  
  <!-- Iris with premium gradient -->
  <circle cx="64" cy="64" r="23" fill="url(#irisGrad)" filter="url(#premiumGlow)"/>
  
  <!-- Inner iris ring - Gold accent -->
  <circle cx="64" cy="64" r="21" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Pupil with premium gradient -->
  <circle cx="64" cy="64" r="13" fill="url(#pupilGrad)" filter="url(#premiumGlow)"/>
  
  <!-- Premium light reflection -->
  <circle cx="59" cy="58" r="5" fill="#ffffff" opacity="0.35" filter="url(#premiumGlow)"/>
  <circle cx="60" cy="58" r="2.5" fill="#ffd700" opacity="0.6"/>
  
  <!-- Stock candles - Premium colors -->
  <g opacity="0.98">
    <!-- Candle 1 - Cyan -->
    <line x1="50" y1="66" x2="50" y2="73" stroke="#00ffff" stroke-width="2" stroke-linecap="round"/>
    <rect x="48.5" y="69" width="3" height="3" fill="#00ffff"/>
    
    <!-- Candle 2 - Green -->
    <line x1="57" y1="62" x2="57" y2="73" stroke="#00d977" stroke-width="2" stroke-linecap="round"/>
    <rect x="55.5" y="65" width="3" height="6" fill="#00d977"/>
    
    <!-- Candle 3 - Gold (tallest) -->
    <line x1="64" y1="54" x2="64" y2="73" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
    <rect x="62.5" y="59" width="3" height="12" fill="#ffd700"/>
    
    <!-- Candle 4 - Green -->
    <line x1="71" y1="63" x2="71" y2="73" stroke="#00d977" stroke-width="2" stroke-linecap="round"/>
    <rect x="69.5" y="66" width="3" height="5" fill="#00d977"/>
    
    <!-- Candle 5 - Cyan -->
    <line x1="78" y1="68" x2="78" y2="73" stroke="#00ffff" stroke-width="2" stroke-linecap="round"/>
    <rect x="76.5" y="70" width="3" height="2" fill="#00ffff"/>
  </g>
  
  <!-- Trend line - Gold with glow -->
  <polyline points="50,73 57,73 64,73 71,73 78,73" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" stroke-dasharray="2,1" filter="url(#premiumGlow)"/>
  
  <!-- Top eyelid - subtle -->
  <path d="M 28 64 Q 64 35 100 64" fill="rgba(0,217,255,0.08)"/>
  
  <!-- Bottom eyelid highlight - subtle -->
  <path d="M 28 64 Q 64 93 100 64" fill="rgba(255,215,0,0.06)"/>
</svg>